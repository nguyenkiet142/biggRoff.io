include /root/gardn/nginx_map.conf;

server {
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/rysteria.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rysteria.pro/privkey.pem;

    try_files _ @$http_upgrade;

    location @ {
        root /root/rysteria/Client/public;
        add_header Cache-Control "no-cache";
    }

    location @websocket {
        proxy_pass http://127.0.0.1:1234;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /map {
        alias /root/rysteria/MapEditor;
    }

    include /root/gardn/nginx_location.conf;
}
